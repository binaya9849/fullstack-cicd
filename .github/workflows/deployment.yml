name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Running tests..."
      - run: echo "npm test here"

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: echo "Building app..."
      - run: echo "npm run build here"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - run: echo "Deploying to Render..."

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - run: echo "Send notification (optional)"